<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Culinary Recipes Collection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Browse, search, and combine ingredients from our curated list of recipes.">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
  <div class="container">
    <header class="hero">
      <h1>Culinary Collection</h1>
      <p>Explore recipes, filter by category, and select multiple items to compile your consolidated shopping list.</p>
    </header>

    <div class="search-container">
      <input type="text" id="filter" class="filter-box" placeholder="Search recipe titles...">
      <button id="clear-search" class="btn btn-secondary">Clear Search</button>
    </div>

    <div id="tag-filters" class="tag-filters"></div>

    <ul id="recipe-list" class="grid"></ul>
  </div>

  <!-- Floating Selection Drawer -->
  <div id="floating-drawer" class="floating-drawer">
    <div class="drawer-info">
      <span id="selected-count">0</span> recipes selected
    </div>
    <div class="drawer-actions">
      <button id="show-ingredients" class="btn btn-primary">List Ingredients</button>
      <button id="clear-selected" class="btn btn-outline">Clear Selected</button>
    </div>
  </div>

  <script>
    let allRecipes = [];
    let selectedIds = new Set();
    let activeTags = new Set();

    function updateClearButton() {
      const drawer = document.getElementById('floating-drawer');
      const countSpan = document.getElementById('selected-count');
      if (selectedIds.size > 0) {
        countSpan.textContent = selectedIds.size;
        drawer.classList.add('active');
      } else {
        drawer.classList.remove('active');
      }
    }

    function handleCheckboxChange(e) {
      const id = e.target.getAttribute('data-id');
      if (e.target.checked) {
        selectedIds.add(id);
      } else {
        selectedIds.delete(id);
      }
      updateClearButton();
    }

    function renderRecipes(recipes) {
      const list = document.getElementById('recipe-list');
      list.innerHTML = '';
      recipes.forEach(recipe => {
        const li = document.createElement('li');
        li.className = 'card';
        let img = recipe.image ? `<img src="${recipe.image}" alt="${recipe.title}" loading="lazy">` : '';
        let link = `<a class="card-title" href="recipe.html?id=${recipe.id}">${recipe.title}</a>`;
        let external = recipe.link ? `<a class="external-link" href="${recipe.link}" target="_blank" title="External link">🔗 recipe source</a>` : '';
        
        let tagsHtml = '';
        if (Array.isArray(recipe.tags) && recipe.tags.length > 0) {
          tagsHtml = `<div class="card-tags">` + 
            recipe.tags.map(t => `<span class="card-tag">${t}</span>`).join('') +
            `</div>`;
        }

        let checked = selectedIds.has(String(recipe.id)) ? 'checked' : '';
        let checkbox = `
          <div class="select-recipe-container">
            <input type="checkbox" class="select-recipe" data-id="${recipe.id}" ${checked} aria-label="Select recipe">
          </div>`;
        li.innerHTML = checkbox + img + link + tagsHtml + external;
        list.appendChild(li);
      });

      // Add event listeners to checkboxes
      document.querySelectorAll('.select-recipe').forEach(cb => {
        cb.addEventListener('change', handleCheckboxChange);
      });

      updateClearButton();
    }

    function renderTagFilters() {
      const tagFiltersContainer = document.getElementById('tag-filters');
      if (!tagFiltersContainer) return;

      const allTagsSet = new Set();
      allRecipes.forEach(recipe => {
        if (Array.isArray(recipe.tags)) {
          recipe.tags.forEach(t => {
            if (t.trim()) allTagsSet.add(t.trim().toLowerCase());
          });
        }
      });

      const standardTags = ['breakfast', 'lunch', 'dinner', 'snack'];
      const extraTags = Array.from(allTagsSet).filter(t => !standardTags.includes(t)).sort();
      const tagsList = ['all', ...standardTags.filter(t => allTagsSet.has(t)), ...extraTags];

      tagFiltersContainer.innerHTML = '';
      tagsList.forEach(tag => {
        const button = document.createElement('button');
        const isActive = (tag === 'all' && activeTags.size === 0) || (tag !== 'all' && activeTags.has(tag));
        button.className = 'tag-pill' + (isActive ? ' active' : '');
        button.textContent = tag === 'all' ? 'All' : tag;
        button.addEventListener('click', () => {
          if (tag === 'all') {
            activeTags.clear();
          } else {
            if (activeTags.has(tag)) {
              activeTags.delete(tag);
            } else {
              activeTags.add(tag);
            }
          }
          renderTagFilters();
          filterAndRender();
        });
        tagFiltersContainer.appendChild(button);
      });
    }

    function filterAndRender() {
      const value = document.getElementById('filter').value.trim().toLowerCase();
      const filtered = allRecipes.filter(recipe => {
        const matchesQuery = recipe.title.toLowerCase().includes(value);
        const matchesTag = activeTags.size === 0 || 
          (Array.isArray(recipe.tags) && [...activeTags].some(t => recipe.tags.some(rt => rt.toLowerCase() === t)));
        return matchesQuery && matchesTag;
      });
      renderRecipes(filtered);
    }

    fetch('recipes.json')
      .then(res => res.json())
      .then(recipes => {
        allRecipes = recipes;
        renderTagFilters();
        filterAndRender();
      });

    document.getElementById('filter').addEventListener('input', filterAndRender);

    document.getElementById('clear-search').addEventListener('click', function() {
      document.getElementById('filter').value = '';
      filterAndRender();
    });

    function handleShowIngredients() {
      const checked = Array.from(selectedIds);
      if (checked.length === 0) {
        alert('Please select at least one recipe.');
        return;
      }
      window.location.href = 'ingredients.html?ids=' + checked.join(',');
    }

    document.getElementById('show-ingredients').addEventListener('click', handleShowIngredients);

    document.getElementById('clear-selected').addEventListener('click', function() {
      selectedIds.clear();
      // Uncheck all boxes in UI
      document.querySelectorAll('.select-recipe').forEach(cb => cb.checked = false);
      updateClearButton();
    });
  </script>
</body>
</html>
