<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Combined Grocery List</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">&larr; Back to recipes</a>

    <div class="combined-list">
      <header class="recipe-header" style="margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
        <h1>Combined Grocery List</h1>
        <p style="color: var(--text-secondary);">We've combined the ingredients from your selected recipes. You can check off items as you shop, copy the list to your notes, or print it out.</p>
      </header>

      <div id="ingredients-list"></div>

      <div class="ingredients-actions">
        <button id="copy-clipboard" class="btn btn-primary">📋 Copy list to notes</button>
        <button onclick="window.print()" class="btn btn-secondary">🖨️ Print List</button>
      </div>
    </div>
  </div>

  <script>
    // Get selected IDs from query string
    const params = new URLSearchParams(window.location.search);
    const ids = params.get('ids') ? params.get('ids').split(',') : [];
    
    if (ids.length === 0) {
      document.getElementById('ingredients-list').innerHTML = '<p style="text-align: center; padding: 2rem; color: var(--text-secondary);">No recipes selected. <a href="index.html">Back to home</a></p>';
      document.querySelector('.ingredients-actions').style.display = 'none';
    } else {
      Promise.all(ids.map(id => fetch('recipes-json/' + id + '.json').then(r => r.json())))
        .then(recipes => {
          // Gather and group all ingredients
          const ingredientMap = {};
          recipes.forEach(recipe => {
            let items = [];
            if (Array.isArray(recipe.ingredients)) {
              items = recipe.ingredients;
            } else if (typeof recipe.ingredients === 'object' && recipe.ingredients !== null) {
              Object.values(recipe.ingredients).forEach(arr => items = items.concat(arr));
            }
            items.forEach(i => {
              const key = i.ingredient.trim().toLowerCase();
              if (!ingredientMap[key]) {
                ingredientMap[key] = { ingredient: i.ingredient, entries: [] };
              }
              ingredientMap[key].entries.push(i);
            });
          });

          // Render grouped list with structured items
          const container = document.getElementById('ingredients-list');
          
          let html = Object.values(ingredientMap).map(obj => {
            const details = obj.entries.map(e => {
              let str = '';
              if (e.amount || e.unit) {
                if (e.amount) str += `${e.amount}`;
                if (e.unit) str += ` ${e.unit}`;
              }
              return str.trim();
            }).filter(Boolean).join(' + ');

            const amountHtml = details ? `<span class="ingredient-item-amount">${details}</span>` : '';
            
            return `
              <div class="ingredient-item-row">
                <label class="checklist-item" style="margin-bottom:0;">
                  <input type="checkbox" onchange="this.parentElement.classList.toggle('checked', this.checked)">
                  <span class="ingredient-item-name">${obj.ingredient}</span>
                </label>
                ${amountHtml}
              </div>`;
          }).join('');
          
          container.innerHTML = html;

          // Enable Clipboard copy functionality
          document.getElementById('copy-clipboard').addEventListener('click', () => {
            const lines = Object.values(ingredientMap).map(obj => {
              const details = obj.entries.map(e => {
                let str = '';
                if (e.amount) str += `${e.amount} `;
                if (e.unit) str += `${e.unit} `;
                return str.trim();
              }).filter(Boolean).join(' + ');
              return `- [ ] ${obj.ingredient}` + (details ? ` (${details})` : '');
            }).join('\n');

            navigator.clipboard.writeText(lines).then(() => {
              const btn = document.getElementById('copy-clipboard');
              const originalText = btn.textContent;
              btn.textContent = '✅ Copied to clipboard!';
              setTimeout(() => btn.textContent = originalText, 2000);
            }).catch(err => {
              console.error('Failed to copy: ', err);
              alert('Could not copy to clipboard. Please copy manually.');
            });
          });
        });
    }
  </script>
</body>
</html>
